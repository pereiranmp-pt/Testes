<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Elmo medieval">
  <rect width="512" height="512" rx="96" ry="96" fill="#1A1410"/>

  <!-- Crest plume -->
  <path d="M 256 36
           C 244 64, 242 80, 252 100
           L 260 100
           C 270 80, 268 64, 256 36 Z"
        fill="#C4622D" stroke="#0E0A07" stroke-width="4" stroke-linejoin="round"/>

  <!-- Helmet outer shell (great helm) -->
  <path d="M 132 188
           C 132 116, 188 84, 256 84
           C 324 84, 380 116, 380 188
           L 380 376
           C 380 412, 348 432, 308 432
           L 204 432
           C 164 432, 132 412, 132 376 Z"
        fill="#C4622D" stroke="#0E0A07" stroke-width="8" stroke-linejoin="round"/>

  <!-- Top band rivets line -->
  <path d="M 144 168 L 368 168" stroke="#0E0A07" stroke-width="6" stroke-linecap="round"/>
  <circle cx="168" cy="168" r="6" fill="#F5F0E8"/>
  <circle cx="216" cy="168" r="6" fill="#F5F0E8"/>
  <circle cx="296" cy="168" r="6" fill="#F5F0E8"/>
  <circle cx="344" cy="168" r="6" fill="#F5F0E8"/>

  <!-- Visor slit -->
  <path d="M 156 246
           L 356 246
           L 356 268
           C 332 256, 180 256, 156 268 Z"
        fill="#0E0A07"/>

  <!-- Center nose ridge -->
  <path d="M 256 168 L 256 246" stroke="#0E0A07" stroke-width="6" stroke-linecap="round"/>

  <!-- Breathing holes (left cluster) -->
  <circle cx="186" cy="324" r="9" fill="#0E0A07"/>
  <circle cx="216" cy="324" r="9" fill="#0E0A07"/>
  <circle cx="186" cy="356" r="9" fill="#0E0A07"/>
  <circle cx="216" cy="356" r="9" fill="#0E0A07"/>

  <!-- Breathing holes (right cluster) -->
  <circle cx="296" cy="324" r="9" fill="#0E0A07"/>
  <circle cx="326" cy="324" r="9" fill="#0E0A07"/>
  <circle cx="296" cy="356" r="9" fill="#0E0A07"/>
  <circle cx="326" cy="356" r="9" fill="#0E0A07"/>

  <!-- Bottom rim -->
  <path d="M 132 392 L 380 392" stroke="#0E0A07" stroke-width="6" stroke-linecap="round"/>
  <circle cx="172" cy="412" r="5" fill="#F5F0E8"/>
  <circle cx="220" cy="412" r="5" fill="#F5F0E8"/>
  <circle cx="292" cy="412" r="5" fill="#F5F0E8"/>
  <circle cx="340" cy="412" r="5" fill="#F5F0E8"/>
</svg>
